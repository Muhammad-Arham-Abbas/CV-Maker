<!DOCTYPE html>
<html>
<head>
    <title>Contacts</title>
</head>

<body>

<h2>Contact Me</h2>

<form>

    <label for="name"><b>Name</b></label><br>
    <input type="text" id="name" placeholder="Your Name" size="50">
    
    <br><br>

    <label for="phone"><b>Phone</b></label><br>
    <input type="tel" id="phone" placeholder="Enter Your Phone Number" size="50">

    <br><br>

    <label for="skill"><b>Choose the Skill</b></label><br>
    <select id="skill">
        <option>Advanced Python</option>
        <option>Web Development</option>
        <option>Data Structures</option>
        <option>Machine Learning</option>
    </select>

    <br><br>

    <label for="advice"><b>Additional Advice</b></label><br>
    <textarea id="advice" rows="5" cols="50" placeholder="Write your advice here..."></textarea>

    <br><br>

    <input type="submit" value="Send Message">

</form>

<br>

<a href="cv.html">Back CV</a>

</body>
</html>
